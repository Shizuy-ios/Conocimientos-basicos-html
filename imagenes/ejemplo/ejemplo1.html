<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo 1 - Imagen en HTML</title>

    <style>
        body {
            background: #1e1e2f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00ffd5;
        }

        img {
            max-width: 300px;
            display: block;
            margin: 15px 0;
            border-radius: 10px;
        }

        a {
            color: #00ffd5;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>Cómo poner una imagen en HTML</h1>

    <p>Ejemplo de imagen con <b>src</b>, <b>alt</b> y <b>title</b>:</p>
    <img src="pan.jpg" alt="Es un pan" title="Pan">

    <p>Otra imagen de ejemplo:</p>
    <img src="Screenshot 2026-04-04 232907.png" alt="Captura de pantalla del ejemplo">

    <a href="../../index.html">Página principal</a>

</body>
</html>

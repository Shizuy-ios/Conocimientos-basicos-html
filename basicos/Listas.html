<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>

    <style>
        body {
            background: #1e1e2f;
            color: white;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #00ffd5;
        }

        h2 {
            color: #ffd700;
            margin-top: 30px;
        }

        ol, ul {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
        }

        li {
            margin: 5px 0;
        }

        img {
            max-width: 300px;
            display: block;
            margin: 15px 0;
            border-radius: 10px;
        }

        a {
            color: #00ffd5;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <h1>Listas</h1>

    <h2>Listas ordenadas</h2>
    <ol>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ol>

    <h2>Listas desordenadas</h2>
    <ul>
        <li>Elemento 1</li>
        <li>Elemento 2</li>
        <li>Elemento 3</li>
    </ul>

    <img src="../imagenes/Listas.png" alt="Ejemplo visual de listas en HTML">

    <a href="../index.html">Página principal</a>

</body>
</html>
